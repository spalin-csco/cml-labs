  description: A sample lab for testing Catalyst 8000v features
  notes: |-
    # Catalyst 8000v Feature Testing

    ## Features

    - CDP
    - ping
    - OSPF single-area
    - NAT - static
    - HSRP
    - DHCP
    - Routed subinterface
    - Restconf
    - Netconf

